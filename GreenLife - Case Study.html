  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

1A);\">GreenLife<\u002Fh1>\n        <p style=\"font-family:'DM Sans'; font-size:clamp(20px,2.1vw,26px); line-height:1.45; color:var(--ink,#15181A); max-width:42ch; margin:30px 0 0; font-weight:500;\">A social app concept that makes living greener feel rewarding, designed on behavioural science.<\u002Fp>\n        <div style=\"display:flex; flex-wrap:wrap; gap:10px; margin-top:34px;\">\n          <span style=\"font-family:'DM Sans', sans-serif; font-size:12px; letter-spacing:0.06em; text-transform:uppercase; padding:9px 15px; border:1px solid var(--line,rgba(21,24,26,0.12)); border-radius:100px; color:var(--ink,#15181A);\">Behaviour change<\u002Fspan>\n          <span style=\"font-family:'DM Sans', sans-serif; font-size:12px; letter-spacing:0.06em; text-transform:uppercase; padding:9px 15px; border:1px solid var(--line,rgba(21,24,26,0.12)); border-radius:100px; color:var(--ink,#15181A);\">Product concept<\u002Fspan>\n          <span style=\"font-family:'DM Sans', sans-serif; font-size:12px; letter-spacing:0.06em; text-transform:uppercase; padding:9px 15px; border:1px solid var(--line,rgba(21,24,26,0.12)); border-radius:100px; color:var(--ink,#15181A);\">Gamification<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"position:relative; display:flex; justify-content:center;\">\n        <div style=\"position:absolute; inset:8% 14%; background:var(--accent,#1E9E57); border-radius:40px; transform:rotate(4deg);\"><\u002Fdiv>\n        <!-- phone: points -->\n        <div style=\"position:relative; width:290px; aspect-ratio:9/19; background:#0E1A12; border-radius:42px; padding:11px; box-shadow:0 30px 70px -28px rgba(0,0,0,0.55);\">\n          <div style=\"background:#FBFCF8; border-radius:32px; height:100%; overflow:hidden; display:flex; flex-direction:column;\">\n            <div style=\"padding:18px 20px 0; display:flex; justify-content:space-between; align-items:center;\">\n              <span style=\"font-family:'DM Sans', sans-serif; font-size:11px; color:#5E635F;\">9:41<\u002Fspan>\n              <span style=\"font-family:'DM Sans', sans-serif; font-size:11px; color:#5E635F;\">GreenLife<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"padding:24px 22px 0;\">\n              <div style=\"font-family:'DM Sans', sans-serif; font-size:11px; letter-spacing:0.12em; text-transform:uppercase; color:#5E635F;\">Your green points<\u002Fdiv>\n              <div style=\"font-family:'Syne'; font-weight:600; font-size:54px; line-height:1; color:#15181A; margin-top:8px;\">1,240<\u002Fdiv>\n              <div style=\"height:8px; border-radius:100px; background:#E7E9E0; margin-top:18px; overflow:hidden;\"><div style=\"width:64%; height:100%; background:#1E9E57;\"><\u002Fdiv><\u002Fdiv>\n              <div style=\"font-family:'DM Sans'; font-size:13px; color:#5E635F; margin-top:8px;\">360 points to your next reward<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"margin:22px 18px 0; padding:16px; background:#15181A; border-radius:18px;\">\n              <div style=\"font-family:'DM Sans', sans-serif; font-size:10px; letter-spacing:0.1em; text-transform:uppercase; color:#1E9E57;\">Redeem<\u002Fdiv>\n              <div style=\"font-family:'Syne'; font-weight:600; font-size:18px; color:#fff; margin-top:6px;\">€5 off a solar starter kit<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"margin-top:auto; padding:16px; display:flex; justify-content:center;\">\n              <div style=\"background:#1E9E57; color:#fff; font-family:'Syne'; font-weight:600; font-size:15px; padding:14px 0; border-radius:16px; width:100%; text-align:center;\">+ Log a green action<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- ============ STAT BAND ============ -->\n  <section style=\"padding: 30px 40px 30px; background: var(--accent, #1E9E57); color: var(--accent-ink, #fff);\">\n    <div style=\"max-width:1180px; margin:0 auto; padding:56px 0; display:grid; grid-template-columns:auto 1fr; gap:40px; align-items:center;\">\n      <div style=\"font-family:'Syne'; font-weight:600; font-size:clamp(72px,12vw,150px); line-height:0.85;\">11%<\u002Fdiv>\n      <p style=\"font-family:'DM Sans'; font-size:clamp(20px,2.2vw,28px); line-height:1.4; font-weight:500; margin:0; max-width:30ch;\">of people in the Netherlands use green energy as their main source. Changing habits is hard, but it's a design problem.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ SNAPSHOT ============ -->\n  <section style=\"padding: 70px 40px;\">\n    <div style=\"max-width:1180px; margin:0 auto; display:grid; grid-template-columns:repeat(4,1fr); border-top:1px solid var(--line,rgba(21,24,26,0.12)); border-bottom:1px solid var(--line,rgba(21,24,26,0.12));\">\n      <div style=\"padding:28px 24px 28px 0; border-right:1px solid var(--line,rgba(21,24,26,0.12));\">\n        <div style=\"font-family:'DM Sans', sans-serif; font-size:11px; letter-spacing:0.12em; text-transform:uppercase; color:var(--muted,#5E635F); margin-bottom:10px;\">Role<\u002Fdiv>\n        <div style=\"font-family:'DM Sans'; font-size:17px; font-weight:600; line-height:1.35; color:var(--ink,#15181A);\">Concept, strategy &amp; behavioural design<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"padding:28px 24px; border-right:1px solid var(--line,rgba(21,24,26,0.12));\">\n        <div style=\"font-family:'DM Sans', sans-serif; font-size:11px; letter-spacing:0.12em; text-transform:uppercase; color:var(--muted,#5E635F); margin-bottom:10px;\">Type<\u002Fdiv>\n        <div style=\"font-family:'DM Sans'; font-size:17px; font-weight:600; line-height:1.35; color:var(--ink,#15181A);\">App concept &amp; pitch<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"padding:28px 24px; border-right:1px solid var(--line,rgba(21,24,26,0.12));\">\n        <div style=\"font-family:'DM Sans', sans-serif; font-size:11px; letter-spacing:0.12em; text-transform:uppercase; color:var(--muted,#5E635F); margin-bottom:10px;\">Field<\u002Fdiv>\n        <div style=\"font-family:'DM Sans'; font-size:17px; font-weight:600; line-height:1.35; color:var(--ink,#15181A);\">Behavioural science<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"padding:28px 0 28px 24px;\">\n        <div style=\"font-family:'DM Sans', sans-serif; font-size:11px; letter-spacing:0.12em; text-transform:uppercase; color:var(--muted,#5E635F); margin-bottom:10px;\">Context<\u002Fdiv>\n        <div style=\"font-family:'DM Sans'; font-size:17px; font-weight:600; line-height:1.35; color:var(--ink,#15181A);\">UvA · BMiBS<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ PROBLEM ============ -->\n  <section id=\"problem\" class=\"cs-section\" style=\"padding: 80px 40px; scroll-margin-top: 90px;\">\n    <div style=\"max-width:1180px; margin:0 auto; display:grid; grid-template-columns:0.85fr 1.15fr; gap:64px;\">\n      <div>\n        <div style=\"font-family:'DM Sans', sans-serif; font-size:13px; letter-spacing:0.18em; text-transform:uppercase; display:flex; gap:14px; align-items:center; color:var(--accent,#1E9E57);\">\n          <span>01<\u002Fspan><span style=\"width:28px;height:1px;background:currentColor;display:inline-block;\"><\u002Fspan><span style=\"color:var(--muted,#5E635F);\">The problem<\u002Fspan>\n        <\u002Fdiv>\n        <h2 style=\"font-family:'Syne'; font-weight:600; font-size:clamp(34px,4.2vw,56px); line-height:1.02; letter-spacing:-0.02em; margin:24px 0 0; color:var(--ink,#15181A); text-wrap:balance;\">People want to be greener. Habits don't follow.<\u002Fh2>\n      <\u002Fdiv>\n      <div>\n        <p style=\"font-family:'DM Sans'; font-size:20px; line-height:1.6; color:var(--ink,#15181A); margin:0 0 22px;\">Sustainable choices are a known good, yet adoption stays low, only one in nine Dutch households runs on green energy. The gap isn't intention; it's friction and feedback.<\u002Fp>\n        <p style=\"font-family:'DM Sans'; font-size:19px; line-height:1.65; color:var(--muted,#5E635F); margin:0 0 22px;\">People weigh immediate rewards over future gains, so a big upfront cost like solar panels stalls, even when it pays off. And a single green act feels invisible: no signal that it mattered, no reason to do the next one.<\u002Fp>\n        <p style=\"font-family:'DM Sans'; font-size:19px; line-height:1.65; color:var(--muted,#5E635F); margin:0;\">The opportunity: make the invisible visible, the future feel present, and the individual feel part of a crowd.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ IDEA / LOOP ============ -->\n  <section id=\"idea\" class=\"cs-section\" style=\"padding: 90px 40px; scroll-margin-top: 90px; background: var(--canvas-2, #FFFFFF);\">\n    <div style=\"max-width:1180px; margin:0 auto;\">\n      <div style=\"font-family:'DM Sans', sans-serif; font-size:13px; letter-spacing:0.18em; text-transform:uppercase; display:flex; gap:14px; align-items:center; color:var(--accent,#1E9E57);\">\n        <span>02<\u002Fspan><span style=\"width:28px;height:1px;background:currentColor;display:inline-block;\"><\u002Fspan><span style=\"color:var(--muted,#5E635F);\">The idea<\u002Fspan>\n      <\u002Fdiv>\n      <h2 style=\"font-family:'Syne'; font-weight:600; font-size:clamp(34px,4.2vw,56px); line-height:1.02; letter-spacing:-0.02em; margin:24px 0 16px; color:var(--ink,#15181A); max-width:20ch;\">Turn green actions into points, status, and rewards.<\u002Fh2>\n      <p style=\"font-family:'DM Sans'; font-size:19px; line-height:1.6; color:var(--muted,#5E635F); max-width:58ch; margin:0 0 56px;\">GreenLife brings green living onto social media and gives the industry exposure. The whole product is one simple loop, repeated until it's a habit.<\u002Fp>\n\n      <div style=\"display:grid; grid-template-columns:repeat(5,1fr); gap:18px; align-items:stretch;\">\n        <div style=\"padding:28px 0 0; border-top:2px solid var(--ink,#15181A);\">\n          <div style=\"font-family:'Syne'; font-weight:600; font-size:34px; color:var(--accent,#1E9E57);\">01<\u002Fdiv>\n          <h3 style=\"font-family:'Syne'; font-weight:600; font-size:18px; margin:14px 0 8px; color:var(--ink,#15181A);\">Act<\u002Fh3>\n          <p style=\"font-family:'DM Sans'; font-size:15px; line-height:1.5; color:var(--muted,#5E635F); margin:0;\">Take the train, bring a reusable cup, eat plant-based.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"padding:28px 0 0; border-top:2px solid var(--ink,#15181A);\">\n          <div style=\"font-family:'Syne'; font-weight:600; font-size:34px; color:var(--accent,#1E9E57);\">02<\u002Fdiv>\n          <h3 style=\"font-family:'Syne'; font-weight:600; font-size:18px; margin:14px 0 8px; color:var(--ink,#15181A);\">Snap<\u002Fh3>\n          <p style=\"font-family:'DM Sans'; font-size:15px; line-height:1.5; color:var(--muted,#5E635F); margin:0;\">Photograph it to log the action in seconds.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"padding:28px 0 0; border-top:2px solid var(--ink,#15181A);\">\n          <div style=\"font-family:'Syne'; font-weight:600; font-size:34px; color:var(--accent,#1E9E57);\">03<\u002Fdiv>\n          <h3 style=\"font-family:'Syne'; font-weight:600; font-size:18px; margin:14px 0 8px; color:var(--ink,#15181A);\">Earn<\u002Fh3>\n          <p style=\"font-family:'DM Sans'; font-size:15px; line-height:1.5; color:var(--muted,#5E635F); margin:0;\">Collect green points that show the impact.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"padding:28px 0 0; border-top:2px solid var(--ink,#15181A);\">\n          <div style=\"font-family:'Syne'; font-weight:600; font-size:34px; color:var(--accent,#1E9E57);\">04<\u002Fdiv>\n          <h3 style=\"font-family:'Syne'; font-weight:600; font-size:18px; margin:14px 0 8px; color:var(--ink,#15181A);\">Redeem<\u002Fh3>\n          <p style=\"font-family:'DM Sans'; font-size:15px; line-height:1.5; color:var(--muted,#5E635F); margin:0;\">Trade points for discounts from green sponsors.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"padding:28px 0 0; border-top:2px solid var(--ink,#15181A);\">\n          <div style=\"font-family:'Syne'; font-weight:600; font-size:34px; color:var(--accent,#1E9E57);\">05<\u002Fdiv>\n          <h3 style=\"font-family:'Syne'; font-weight:600; font-size:18px; margin:14px 0 8px; color:var(--ink,#15181A);\">Share<\u002Fh3>\n          <p style=\"font-family:'DM Sans'; font-size:15px; line-height:1.5; color:var(--muted,#5E635F); margin:0;\">Post it, and pull your friends into the streak.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ PRODUCT / MOCKUPS ============ -->\n  <section id=\"product\" class=\"cs-section\" style=\"padding: 100px 40px; scroll-margin-top: 90px;\">\n    <div style=\"max-width:1180px; margin:0 auto;\">\n      <div style=\"font-family:'DM Sans', sans-serif; font-size:13px; letter-spacing:0.18em; text-transform:uppercase; display:flex; gap:14px; align-items:center; color:var(--accent,#1E9E57);\">\n        <span>03<\u002Fspan><span style=\"width:28px;height:1px;background:currentColor;display:inline-block;\"><\u002Fspan><span style=\"color:var(--muted,#5E635F);\">The product<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex; justify-content:space-between; align-items:flex-end; flex-wrap:wrap; gap:20px; margin:24px 0 56px;\">\n        <h2 style=\"font-family:'Syne'; font-weight:600; font-size:clamp(34px,4.2vw,56px); line-height:1.02; letter-spacing:-0.02em; margin:0; color:var(--ink,#15181A); max-width:16ch;\">The loop, on a screen.<\u002Fh2>\n        <span style=\"font-family:'DM Sans', sans-serif; font-size:12px; letter-spacing:0.06em; text-transform:uppercase; color:var(--muted,#5E635F); padding:8px 14px; border:1px dashed var(--line,rgba(21,24,26,0.3)); border-radius:100px;\">Concept mockups<\u002Fspan>\n      <\u002Fdiv>\n\n      <div style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:36px; justify-items:center;\">\n        <!-- screen: log -->\n        <div style=\"width:100%; max-width:300px;\">\n          <div style=\"width:100%; aspect-ratio:9/19; background:#0E1A12; border-radius:40px; padding:11px; box-shadow:0 24px 50px -26px rgba(0,0,0,0.5);\">\n            <div style=\"background:#FBFCF8; border-radius:30px; height:100%; overflow:hidden; display:flex; flex-direction:column;\">\n              <div style=\"padding:18px 20px 0; display:flex; justify-content:space-between;\"><span style=\"font-family:'DM Sans', sans-serif; font-size:11px; color:#5E635F;\">9:41<\u002Fspan><span style=\"font-family:'DM Sans', sans-serif; font-size:11px; color:#5E635F;\">Log<\u002Fspan><\u002Fdiv>\n              <div style=\"padding:20px 20px 0;\">\n                <div style=\"font-family:'Syne'; font-weight:600; font-size:24px; color:#15181A;\">Log a green action<\u002Fdiv>\n                <div style=\"display:flex; flex-direction:column; gap:10px; margin-top:18px;\">\n                  <div style=\"display:flex; align-items:center; gap:12px; padding:14px; border:1px solid #E7E9E0; border-radius:14px;\"><span style=\"width:10px;height:10px;border-radius:50%;background:#1E9E57;\"><\u002Fspan><span style=\"font-family:'DM Sans'; font-size:14px; font-weight:600; color:#15181A; flex:1;\">Took the train<\u002Fspan><span style=\"font-family:'DM Sans', sans-serif; font-size:12px; color:#1E9E57;\">+40<\u002Fspan><\u002Fdiv>\n                  <div style=\"display:flex; align-items:center; gap:12px; padding:14px; border:1px solid #E7E9E0; border-radius:14px;\"><span style=\"width:10px;height:10px;border-radius:50%;background:#1E9E57;\"><\u002Fspan><span style=\"font-family:'DM Sans'; font-size:14px; font-weight:600; color:#15181A; flex:1;\">Reusable cup<\u002Fspan><span style=\"font-family:'DM Sans', sans-serif; font-size:12px; color:#1E9E57;\">+10<\u002Fspan><\u002Fdiv>\n                  <div style=\"display:flex; align-items:center; gap:12px; padding:14px; border:1px solid #E7E9E0; border-radius:14px;\"><span style=\"width:10px;height:10px;border-radius:50%;background:#1E9E57;\"><\u002Fspan><span style=\"font-family:'DM Sans'; font-size:14px; font-weight:600; color:#15181A; flex:1;\">Vegetarian meal<\u002Fspan><span style=\"font-family:'DM Sans', sans-serif; font-size:12px; color:#1E9E57;\">+25<\u002Fspan><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"margin-top:auto; padding:16px;\"><div style=\"background:#1E9E57; color:#fff; font-family:'Syne'; font-weight:600; font-size:15px; padding:14px 0; border-radius:16px; text-align:center;\">Add with photo<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-family:'DM Sans', sans-serif; font-size:12px; letter-spacing:0.08em; text-transform:uppercase; color:var(--muted,#5E635F); text-align:center; margin-top:18px;\">Log &amp; snap<\u002Fdiv>\n        <\u002Fdiv>\n        <!-- screen: points -->\n        <div style=\"width:100%; max-width:300px;\">\n          <div style=\"width:100%; aspect-ratio:9/19; background:#0E1A12; border-radius:40px; padding:11px; box-shadow:0 24px 50px -26px rgba(0,0,0,0.5);\">\n            <div style=\"background:#FBFCF8; border-radius:30px; height:100%; overflow:hidden; display:flex; flex-direction:column;\">\n              <div style=\"padding:18px 20px 0; display:flex; justify-content:space-between;\"><span style=\"font-family:'DM Sans', sans-serif; font-size:11px; color:#5E635F;\">9:41<\u002Fspan><span style=\"font-family:'DM Sans', sans-serif; font-size:11px; color:#5E635F;\">You<\u002Fspan><\u002Fdiv>\n              <div style=\"padding:24px 22px 0;\">\n                <div style=\"font-family:'DM Sans', sans-serif; font-size:11px; letter-spacing:0.12em; text-transform:uppercase; color:#5E635F;\">Your green points<\u002Fdiv>\n                <div style=\"font-family:'Syne'; font-weight:600; font-size:52px; line-height:1; color:#15181A; margin-top:8px;\">1,240<\u002Fdiv>\n                <div style=\"height:8px; border-radius:100px; background:#E7E9E0; margin-top:18px; overflow:hidden;\"><div style=\"width:64%; height:100%; background:#1E9E57;\"><\u002Fdiv><\u002Fdiv>\n                <div style=\"font-family:'DM Sans'; font-size:13px; color:#5E635F; margin-top:8px;\">360 to your next reward<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"margin:20px 18px 0; padding:16px; background:#15181A; border-radius:18px;\"><div style=\"font-family:'DM Sans', sans-serif; font-size:10px; letter-spacing:0.1em; text-transform:uppercase; color:#1E9E57;\">Redeem<\u002Fdiv><div style=\"font-family:'Syne'; font-weight:600; font-size:17px; color:#fff; margin-top:6px;\">€5 off a solar starter kit<\u002Fdiv><\u002Fdiv>\n              <div style=\"margin:12px 18px 18px; padding:16px; background:#EFF3EC; border-radius:18px;\"><div style=\"font-family:'DM Sans', sans-serif; font-size:10px; letter-spacing:0.1em; text-transform:uppercase; color:#5E635F;\">This saved<\u002Fdiv><div style=\"font-family:'Syne'; font-weight:600; font-size:17px; color:#15181A; margin-top:6px;\">~ 84 kg CO₂ this month<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-family:'DM Sans', sans-serif; font-size:12px; letter-spacing:0.08em; text-transform:uppercase; color:var(--muted,#5E635F); text-align:center; margin-top:18px;\">Earn &amp; redeem<\u002Fdiv>\n        <\u002Fdiv>\n        <!-- screen: social -->\n        <div style=\"width:100%; max-width:300px;\">\n          <div style=\"width:100%; aspect-ratio:9/19; background:#0E1A12; border-radius:40px; padding:11px; box-shadow:0 24px 50px -26px rgba(0,0,0,0.5);\">\n            <div style=\"background:#FBFCF8; border-radius:30px; height:100%; overflow:hidden; display:flex; flex-direction:column;\">\n              <div style=\"padding:18px 20px 0; display:flex; justify-content:space-between;\"><span style=\"font-family:'DM Sans', sans-serif; font-size:11px; color:#5E635F;\">9:41<\u002Fspan><span style=\"font-family:'DM Sans', sans-serif; font-size:11px; color:#5E635F;\">Friends<\u002Fspan><\u002Fdiv>\n              <div style=\"padding:20px 20px 0;\">\n                <div style=\"font-family:'Syne'; font-weight:600; font-size:24px; color:#15181A;\">This week<\u002Fdiv>\n                <div style=\"display:flex; flex-direction:column; gap:8px; margin-top:18px;\">\n                  <div style=\"display:flex; align-items:center; gap:12px; padding:13px 14px; border-radius:14px; background:#15181A;\"><span style=\"font-family:'Syne'; font-weight:600; font-size:14px; color:#1E9E57; width:18px;\">1<\u002Fspan><span style=\"font-family:'DM Sans'; font-size:14px; font-weight:700; color:#fff; flex:1;\">You<\u002Fspan><span style=\"font-family:'DM Sans', sans-serif; font-size:12px; color:#1E9E57;\">1,240<\u002Fspan><\u002Fdiv>\n                  <div style=\"display:flex; align-items:center; gap:12px; padding:13px 14px; border-radius:14px; border:1px solid #E7E9E0;\"><span style=\"font-family:'Syne'; font-weight:600; font-size:14px; color:#5E635F; width:18px;\">2<\u002Fspan><span style=\"font-family:'DM Sans'; font-size:14px; font-weight:600; color:#15181A; flex:1;\">Sofia<\u002Fspan><span style=\"font-family:'DM Sans', sans-serif; font-size:12px; color:#5E635F;\">1,190<\u002Fspan><\u002Fdiv>\n                  <div style=\"display:flex; align-items:center; gap:12px; padding:13px 14px; border-radius:14px; border:1px solid #E7E9E0;\"><span style=\"font-family:'Syne'; font-weight:600; font-size:14px; color:#5E635F; width:18px;\">3<\u002Fspan><span style=\"font-family:'DM Sans'; font-size:14px; font-weight:600; color:#15181A; flex:1;\">Daan<\u002Fspan><span style=\"font-family:'DM Sans', sans-serif; font-size:12px; color:#5E635F;\">1,005<\u002Fspan><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"margin-top:auto; padding:16px;\"><div style=\"border:1.5px solid #15181A; color:#15181A; font-family:'Syne'; font-weight:600; font-size:15px; padding:13px 0; border-radius:16px; text-align:center;\">Share your week<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-family:'DM Sans', sans-serif; font-size:12px; letter-spacing:0.08em; text-transform:uppercase; color:var(--muted,#5E635F); text-align:center; margin-top:18px;\">Compete &amp; share<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ BEHAVIOUR / SCIENCE ============ -->\n  <section id=\"science\" class=\"cs-section\" style=\"padding: 100px 40px; scroll-margin-top: 90px; background:#15181A; color:#F4F2E9;\">\n    <div style=\"max-width:1180px; margin:0 auto;\">\n      <div style=\"font-family:'DM Sans', sans-serif; font-size:13px; letter-spacing:0.18em; text-transform:uppercase; display:flex; gap:14px; align-items:center; color:#5FCF8E;\">\n        <span>04<\u002Fspan><span style=\"width:28px;height:1px;background:currentColor;display:inline-block;\"><\u002Fspan><span style=\"color:rgba(244,242,233,0.6);\">The behaviour design<\u002Fspan>\n      <\u002Fdiv>\n      <h2 style=\"font-family:'Syne'; font-weight:600; font-size:clamp(34px,4.4vw,58px); line-height:1.02; letter-spacing:-0.02em; margin:24px 0 16px; color:#F4F2E9; max-width:22ch;\">Four levers, each backed by research.<\u002Fh2>\n      <p style=\"font-family:'DM Sans'; font-size:19px; line-height:1.6; color:rgba(244,242,233,0.7); max-width:56ch; margin:0 0 64px;\">Every feature maps to a documented mechanism for changing behaviour, the gamification is the delivery, not the point.<\u002Fp>\n\n      <div style=\"display:grid; grid-template-columns:repeat(2,1fr); gap:48px 50px;\">\n        <div style=\"padding-top:26px; border-top:1px solid rgba(244,242,233,0.25);\">\n          <h3 style=\"font-family:'Syne'; font-weight:600; font-size:24px; margin:0 0 10px; color:#F4F2E9;\">Messenger authority<\u002Fh3>\n          <p style=\"font-family:'DM Sans'; font-size:17px; line-height:1.55; color:rgba(244,242,233,0.72); margin:0 0 14px;\">We act on information more when it comes from a credible source, so launch is seeded with public figures and creators visibly using the app.<\u002Fp>\n          <span style=\"font-family:'DM Sans', sans-serif; font-size:12px; color:#5FCF8E;\">Dolan et al., 2012 · MINDSPACE<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"padding-top:26px; border-top:1px solid rgba(244,242,233,0.25);\">\n          <h3 style=\"font-family:'Syne'; font-weight:600; font-size:24px; margin:0 0 10px; color:#F4F2E9;\">Social norm<\u002Fh3>\n          <p style=\"font-family:'DM Sans'; font-size:17px; line-height:1.55; color:rgba(244,242,233,0.72); margin:0 0 14px;\">If your friends are doing it, you want to too. A weekly leaderboard turns greener living into a friendly competition, who can earn the most points?<\u002Fp>\n          <span style=\"font-family:'DM Sans', sans-serif; font-size:12px; color:#5FCF8E;\">Dolan et al., 2012<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"padding-top:26px; border-top:1px solid rgba(244,242,233,0.25);\">\n          <h3 style=\"font-family:'Syne'; font-weight:600; font-size:24px; margin:0 0 10px; color:#F4F2E9;\">Commitment &amp; foot-in-the-door<\u002Fh3>\n          <p style=\"font-family:'DM Sans'; font-size:17px; line-height:1.55; color:rgba(244,242,233,0.72); margin:0 0 14px;\">Signing up is a small public pledge, “I commit to being green.” Once someone logs a first tiny action, they're far likelier to take bigger ones.<\u002Fp>\n          <span style=\"font-family:'DM Sans', sans-serif; font-size:12px; color:#5FCF8E;\">Freedman &amp; Fraser, 1966<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"padding-top:26px; border-top:1px solid rgba(244,242,233,0.25);\">\n          <h3 style=\"font-family:'Syne'; font-weight:600; font-size:24px; margin:0 0 10px; color:#F4F2E9;\">Environmental self-identity<\u002Fh3>\n          <p style=\"font-family:'DM Sans'; font-size:17px; line-height:1.55; color:rgba(244,242,233,0.72); margin:0 0 14px;\">Seeing a record of what you've already done, and its real impact, strengthens the sense of being “a green person,” which drives the next action.<\u002Fp>\n          <span style=\"font-family:'DM Sans', sans-serif; font-size:12px; color:#5FCF8E;\">van der Werff &amp; Steg, 2016<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ BUSINESS MODEL ============ -->\n  <section id=\"model\" class=\"cs-section\" style=\"padding: 100px 40px; scroll-margin-top: 90px;\">\n    <div style=\"max-width:1180px; margin:0 auto;\">\n      <div style=\"font-family:'DM Sans', sans-serif; font-size:13px; letter-spacing:0.18em; text-transform:uppercase; display:flex; gap:14px; align-items:center; color:var(--accent,#1E9E57);\">\n        <span>05<\u002Fspan><span style=\"width:28px;height:1px;background:currentColor;display:inline-block;\"><\u002Fspan><span style=\"color:var(--muted,#5E635F);\">The model<\u002Fspan>\n      <\u002Fdiv>\n      <h2 style=\"font-family:'Syne'; font-weight:600; font-size:clamp(34px,4.2vw,56px); line-height:1.02; letter-spacing:-0.02em; margin:24px 0 16px; color:var(--ink,#15181A); max-width:20ch;\">Everyone wins when the user goes green.<\u002Fh2>\n      <p style=\"font-family:'DM Sans'; font-size:19px; line-height:1.6; color:var(--muted,#5E635F); max-width:58ch; margin:0 0 50px;\">GreenLife is funded by partnerships with green companies, solar sellers, public transport, reusable and plant-based brands, who reach motivated users at the moment of intent.<\u002Fp>\n\n      <div style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:30px;\">\n        <div style=\"padding:34px 0 0; border-top:2px solid var(--ink,#15181A);\">\n          <div style=\"font-family:'DM Sans', sans-serif; font-size:12px; letter-spacing:0.1em; text-transform:uppercase; color:var(--accent,#1E9E57); margin-bottom:14px;\">The user<\u002Fdiv>\n          <h3 style=\"font-family:'Syne'; font-weight:600; font-size:22px; margin:0 0 10px; color:var(--ink,#15181A);\">Reward<\u002Fh3>\n          <p style=\"font-family:'DM Sans'; font-size:16px; line-height:1.55; color:var(--muted,#5E635F); margin:0;\">Discounts and status for doing what they already wanted to do, with proof their choices add up.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"padding:34px 0 0; border-top:2px solid var(--ink,#15181A);\">\n          <div style=\"font-family:'DM Sans', sans-serif; font-size:12px; letter-spacing:0.1em; text-transform:uppercase; color:var(--accent,#1E9E57); margin-bottom:14px;\">The sponsors<\u002Fdiv>\n          <h3 style=\"font-family:'Syne'; font-weight:600; font-size:22px; margin:0 0 10px; color:var(--ink,#15181A);\">Customers at intent<\u002Fh3>\n          <p style=\"font-family:'DM Sans'; font-size:16px; line-height:1.55; color:var(--muted,#5E635F); margin:0;\">Solar panels, reusable cups, vegetarian food and transit reach people already leaning in.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"padding:34px 0 0; border-top:2px solid var(--ink,#15181A);\">\n          <div style=\"font-family:'DM Sans', sans-serif; font-size:12px; letter-spacing:0.1em; text-transform:uppercase; color:var(--accent,#1E9E57); margin-bottom:14px;\">The government<\u002Fdiv>\n          <h3 style=\"font-family:'Syne'; font-weight:600; font-size:22px; margin:0 0 10px; color:var(--ink,#15181A);\">Policy without force<\u002Fh3>\n          <p style=\"font-family:'DM Sans'; font-size:16px; line-height:1.55; color:var(--muted,#5E635F); margin:0;\">Greener behaviour at population scale, nudged, not mandated by strict policy.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"margin-top:80px; display:grid; grid-template-columns:0.85fr 1.15fr; gap:64px;\">\n        <h3 style=\"font-family:'Syne'; font-weight:600; font-size:clamp(26px,2.8vw,38px); line-height:1.05; letter-spacing:-0.02em; margin:0; color:var(--ink,#15181A);\">What I took from it.<\u002Fh3>\n        <div>\n          <p style=\"font-family:'DM Sans'; font-size:19px; line-height:1.65; color:var(--ink,#15181A); margin:0 0 22px;\">The concept started from a behaviour, not a feature list: what stops people acting greener, and which proven levers move them. The product fell out of the psychology.<\u002Fp>\n          <p style=\"font-family:'DM Sans'; font-size:18px; line-height:1.65; color:var(--muted,#5E635F); margin:0;\">If I took it further, I'd prototype the core loop and test one lever at a time, does a leaderboard or a self-identity recap drive more repeat logging?, before adding anything else.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ FOOTER ============ -->\n  <footer style=\"background:#141210; color:#fff; padding:88px 40px 52px;\">\n    <div style=\"max-width:1180px; margin:0 auto;\">\n      <div style=\"display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; gap:48px;\">\n        <div style=\"max-width:30ch;\">\n          <div style=\"font-family:'Syne'; font-weight:600; font-size:clamp(34px,4.6vw,62px); line-height:0.95; color:#fff;\">Let's work together.<\u002Fdiv>\n          <a href=\"mailto:paulaledesma98@gmail.com\" style=\"font-family:'DM Sans'; font-size:18px; font-weight:600; color:var(--accent,#1E9E57); text-decoration:none; display:inline-block; margin-top:20px;\">paulaledesma98@gmail.com<\u002Fa>\n          <div style=\"font-family:'DM Sans'; font-size:15px; color:rgba(255,255,255,0.55); margin-top:8px;\">Paula Ledesma · Brand &amp; Product Marketing<\u002Fdiv>\n        <\u002Fdiv>\n        <nav style=\"display:flex; flex-direction:column; gap:11px; min-width:210px;\">\n          <div style=\"font-family:'DM Sans'; font-size:12px; letter-spacing:0.14em; text-transform:uppercase; color:rgba(255,255,255,0.4); margin-bottom:6px;\">Case studies<\u002Fdiv>\n          <a href=\"Moving Sound - Case Study.html\" style=\"font-family:'DM Sans'; font-size:16px; font-weight:600; color:#fff; text-decoration:none;\">Moving Sound<\u002Fa>\n          <a href=\"GreenLife - Case Study.html\" style=\"font-family:'DM Sans'; font-size:16px; font-weight:600; color:#fff; text-decoration:none;\">GreenLife<\u002Fa>\n          <a href=\"Lebkov Menu - Case Study.html\" style=\"font-family:'DM Sans'; font-size:16px; font-weight:600; color:#fff; text-decoration:none;\">Menu Engineering<\u002Fa>\n          <a href=\"index.html\" style=\"font-family:'DM Sans'; font-size:15px; font-weight:600; color:var(--accent,#1E9E57); text-decoration:none; margin-top:6px;\">All work →<\u002Fa>\n        <\u002Fnav>\n      <\u002Fdiv>\n      <div style=\"margin-top:56px; padding-top:22px; border-top:1px solid rgba(255,255,255,0.15); display:flex; justify-content:space-between; flex-wrap:wrap; gap:12px;\">\n        <span style=\"font-family:'DM Sans'; font-size:12px; color:rgba(255,255,255,0.45);\">Selected work · 2026<\u002Fspan>\n        <span style=\"font-family:'DM Sans'; font-size:12px; color:rgba(255,255,255,0.45);\">Made by Paula Ledesma<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:&quot;1280&quot;,&quot;height&quot;:&quot;3200&quot;},&quot;tone&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;Warm Light&quot;,&quot;Ink Dark&quot;],&quot;default&quot;:&quot;Warm Light&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Theme&quot;},&quot;accent&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;Green&quot;,&quot;Clay&quot;,&quot;Yellow&quot;,&quot;Blue&quot;],&quot;default&quot;:&quot;Green&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Theme&quot;},&quot;showSideNav&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Layout&quot;}}\">\nclass Component extends DCLogic {\n  renderVals() {\n    const tone = this.props.tone ?? 'Warm Light';\n    const dark = tone === 'Ink Dark';\n    const accentName = this.props.accent ?? 'Green';\n    const accents = {\n      Green:  { c: '#1E9E57', ink: '#FFFFFF' },\n      Clay:   { c: '#C8472A', ink: '#FFFFFF' },\n      Yellow: { c: '#E6A400', ink: '#231900' },\n      Blue:   { c: '#0B5ED7', ink: '#FFFFFF' }\n    };\n    const a = accents[accentName] || accents.Green;\n    const theme = dark\n      ? { canvas: '#101412', canvas2: '#1B201C', ink: '#EEF1EA', muted: '#9AA09A', line: 'rgba(255,255,255,0.14)', lineStrong: 'rgba(255,255,255,0.9)' }\n      : { canvas: '#F4F2E9', canvas2: '#FFFFFF', ink: '#15181A', muted: '#5E635F', line: 'rgba(21,24,26,0.12)', lineStrong: 'rgba(21,24,26,0.9)' };\n    return {\n      accent: a.c, accentInk: a.ink,\n      canvas: theme.canvas, canvas2: theme.canvas2, ink: theme.ink,\n      muted: theme.muted, line: theme.line, lineStrong: theme.lineStrong,\n      showSideNav: this.props.showSideNav ?? true\n    };\n  }\n\n  componentDidMount() {\n    this._onScroll = () => {\n      const bar = document.getElementById('cs-progress');\n      if (!bar) return;\n      const doc = document.documentElement;\n      const max = (doc.scrollHeight - window.innerHeight) || 1;\n      const cur = window.scrollY || doc.scrollTop || 0;\n      bar.style.width = Math.min(100, Math.max(0, (cur / max) * 100)) + '%';\n    };\n    window.addEventListener('scroll', this._onScroll, { passive: true });\n    this._onScroll();\n\n    try {\n      const links = Array.from(document.querySelectorAll('[data-navlink]'));\n      const map = {};\n      links.forEach(l => { map[l.getAttribute('href').slice(1)] = l; });\n      this._io = new IntersectionObserver((entries) => {\n        entries.forEach(e => {\n          if (e.isIntersecting) {\n            links.forEach(l => { l.style.opacity = '0.4'; l.style.fontWeight = '400'; });\n            const act = map[e.target.id];\n            if (act) { act.style.opacity = '1'; act.style.fontWeight = '700'; }\n          }\n        });\n      }, { rootMargin: '-45% 0px -50% 0px' });\n      document.querySelectorAll('.cs-section').forEach(s => this._io.observe(s));\n    } catch (err) {}\n  }\n\n  componentWillUnmount() {\n    if (this._onScroll) window.removeEventListener('scroll', this._onScroll);\n    if (this._io) this._io.disconnect();\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
