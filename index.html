document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

.82));\"><\u002Fdiv>\n    <div style=\"max-width: 1180px; margin: 0 auto; position:relative; z-index:1;\">\n      \n      \n      <div style=\"margin-bottom:28px;\"><span style=\"font-family: DM Sans; font-size: 13px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted,#6B6760)\"><span style=\"color: rgb(32, 30, 26); font-family: Syne, sans-serif; font-size: 16px; font-weight: 600; letter-spacing: -0.16px; text-align: start; text-transform: none\">Paula Ledesma<\u002Fspan><\u002Fspan><\u002Fdiv>\n      <h1 style=\"font-family:'Syne'; font-weight:600; font-size:clamp(46px,6.2vw,90px); line-height:1.0; letter-spacing:-0.03em; margin:0 auto; color:var(--ink,#201E1A); max-width:17ch;\">I turn behavioural science into brands people choose.<\u002Fh1>\n      <p style=\"font-family:'DM Sans'; font-size:clamp(19px,1.9vw,23px); line-height:1.55; color:var(--muted,#6B6760); max-width:56ch; margin:30px auto 0; font-weight:500;\">Senior brand and product marketer, building campaigns and product launches across consumer tech in 15+ markets. My background in psychology shapes how I think about audiences and what actually makes something land.<\u002Fp><div style=\"display: flex; flex-wrap: wrap; gap: 10px; margin-top: 36px; justify-content: center\">\n        <span style=\"font-family: DM Sans; font-size: 12px; letter-spacing: 0.06em; text-transform: uppercase; padding: 9px 16px; border-radius: 100px; background: #0B5ED7; color: #fff\">Go-to-market<\u002Fspan>\n        <span style=\"font-family: DM Sans; font-size: 12px; letter-spacing: 0.06em; text-transform: uppercase; padding: 9px 16px; border-radius: 100px; background: #2E7D52; color: #fff\">Behaviour change<\u002Fspan>\n        <span style=\"font-family: DM Sans; font-size: 12px; letter-spacing: 0.06em; text-transform: uppercase; padding: 9px 16px; border-radius: 100px; background: #C24B2C; color: #fff\">Brand &amp; research<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- ============ WORK ============ -->\n  <section id=\"work\" style=\"padding: 50px 40px 30px;\">\n    <div style=\"max-width:1180px; margin:0 auto;\">\n      <div style=\"display:flex; justify-content:space-between; align-items:baseline; border-bottom:1px solid var(--line,rgba(22,21,27,0.1)); padding-bottom:18px; margin-bottom:44px;\">\n        <span style=\"font-family: DM Sans; font-size: 13px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted,#5C5A66)\">Selected work<\u002Fspan>\n        <span style=\"font-family:'DM Sans', sans-serif; font-size:13px; letter-spacing:0.16em; text-transform:uppercase; color:var(--muted,#5C5A66);\"><br><\u002Fspan>\n      <\u002Fdiv>\n\n      <div style=\"display:flex; flex-direction:column; gap:30px;\">\n\n        <!-- MOVING SOUND -->\n        <a href=\"Moving Sound - Case Study.html\" class=\"proj\" style=\"display:grid; grid-template-columns:0.95fr 1.05fr; gap:0; text-decoration:none; border-radius:18px; overflow:hidden; border:1px solid var(--line,rgba(22,21,27,0.1)); background:var(--canvas-2,#fff);\">\n          <div style=\"background:#0B5ED7; padding:46px 44px; display:flex; flex-direction:column; justify-content:space-between; min-height:320px;\">\n            \n            <div style=\"font-family: DM Sans; font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; color: #fff; text-align: center\">01 / Go-to-market<\u002Fdiv><img src=\"d977cc30-2ad6-4f82-8c06-48558b79afa0\" alt=\"Moving Sound\" style=\"width: 313px; align-self: center; border-radius: 12px; box-shadow: 0 20px 44px -22px rgba(0,0,0,0.5); height: 263px; transform-origin: 0 100%; transform: scale(0.9026,0.9349)\"><div style=\"font-family: 'Syne'; font-weight: 600; font-size: 22px; color: #fff; text-align: center; align-self: center; position: relative; top: 20px\">Live Loud.<\u002Fdiv>\n            \n          <\u002Fdiv>\n          <div style=\"padding:46px 44px; display:flex; flex-direction:column; justify-content:center;\">\n            <div style=\"font-family: DM Sans; font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted,#5C5A66)\">PHILIPS SOUND<\u002Fdiv>\n            <h2 style=\"font-family:'Syne'; font-weight:600; font-size:clamp(30px,3vw,44px); line-height:1.0; letter-spacing:-0.02em; margin:14px 0 14px; color:var(--ink,#16151B);\">Moving Sound<\u002Fh2>\n            \n            <p style=\"font-family:'DM Sans'; font-size:18px; line-height:1.55; color:var(--muted,#5C5A66); margin:0 0 24px; max-width:42ch;\">Developing the positioning, name, identity and GTM strategy for an audio brand targeting Gen Z, and leading a social-first campaign that launched across eight markets.<\u002Fp><div style=\"display:flex; gap:8px; flex-wrap:wrap; margin-bottom:26px;\">\n              <span style=\"font-family:'DM Sans', sans-serif; font-size:11px; text-transform:uppercase; letter-spacing:0.06em; padding:7px 12px; border:1px solid var(--line,rgba(22,21,27,0.14)); border-radius:100px; color:var(--ink,#16151B);\">Positioning<\u002Fspan><span style=\"font-family:'DM Sans', sans-serif; font-size:11px; text-transform:uppercase; letter-spacing:0.06em; padding:7px 12px; border:1px solid var(--line,rgba(22,21,27,0.14)); border-radius:100px; color:var(--ink,#16151B);\">GTM Strategy<br><\u002Fspan>\n              <span style=\"font-family:'DM Sans', sans-serif; font-size:11px; text-transform:uppercase; letter-spacing:0.06em; padding:7px 12px; border:1px solid var(--line,rgba(22,21,27,0.14)); border-radius:100px; color:var(--ink,#16151B);\">Campaign<\u002Fspan>\n              <span style=\"font-family:'DM Sans', sans-serif; font-size:11px; text-transform:uppercase; letter-spacing:0.06em; padding:7px 12px; border:1px solid var(--line,rgba(22,21,27,0.14)); border-radius:100px; color:var(--ink,#16151B);\">Brand system<\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"go\" style=\"display:flex; align-items:center; gap:10px; font-family:'DM Sans', sans-serif; font-size:13px; letter-spacing:0.08em; text-transform:uppercase; color:#16151B; font-weight:700;\">View case study <span>→<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fa>\n\n        <!-- GREENLIFE -->\n        <a href=\"GreenLife - Case Study.html\" class=\"proj\" style=\"display:grid; grid-template-columns:0.95fr 1.05fr; gap:0; text-decoration:none; border-radius:18px; overflow:hidden; border:1px solid var(--line,rgba(22,21,27,0.1)); background:var(--canvas-2,#fff);\">\n          <div style=\"background:#2E7D52; padding:46px 44px; display:flex; flex-direction:column; justify-content:space-between; min-height:320px;\">\n            <div style=\"font-family: DM Sans; font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; color: #fff; text-align: center\">02 / Behaviour change<\u002Fdiv>\n            <div style=\"align-self:center; width:150px; background:#0E1A12; border-radius:24px; padding:8px;\">\n              <div style=\"background:#FBFCF8; border-radius:18px; padding:18px 16px;\">\n                <div style=\"font-family:'DM Sans', sans-serif; font-size:9px; letter-spacing:0.1em; text-transform:uppercase; color:#5E635F;\">Green points<\u002Fdiv>\n                <div style=\"font-family:'Syne'; font-weight:600; font-size:34px; line-height:1; color:#15181A; margin-top:4px;\">1,240<\u002Fdiv>\n                <div style=\"height:6px; border-radius:100px; background:#E7E9E0; margin-top:12px; overflow:hidden;\"><div style=\"width:64%; height:100%; background:#2E7D52;\"><\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv><div style=\"font-family: 'Syne'; font-weight: 600; font-size: 22px; color: #fff; text-align: center\">Make going green fun.<\u002Fdiv>\n            \n          <\u002Fdiv>\n          <div style=\"padding:46px 44px; display:flex; flex-direction:column; justify-content:center;\">\n            <div style=\"font-family:'DM Sans', sans-serif; font-size:12px; letter-spacing:0.1em; text-transform:uppercase; color:var(--muted,#5C5A66);\">App concept · UvA<\u002Fdiv>\n            <h2 style=\"font-family:'Syne'; font-weight:600; font-size:clamp(30px,3vw,44px); line-height:1.0; letter-spacing:-0.02em; margin:14px 0 14px; color:var(--ink,#16151B);\">GreenLife<\u002Fh2>\n            <p style=\"font-family:'DM Sans'; font-size:18px; line-height:1.55; color:var(--muted,#5C5A66); margin:0 0 24px; max-width:42ch;\">A social app that makes sustainable habits rewarding, designed on four proven behaviour-change levers.<\u002Fp>\n            <div style=\"display:flex; gap:8px; flex-wrap:wrap; margin-bottom:26px;\">\n              <span style=\"font-family:'DM Sans', sans-serif; font-size:11px; text-transform:uppercase; letter-spacing:0.06em; padding:7px 12px; border:1px solid var(--line,rgba(22,21,27,0.14)); border-radius:100px; color:var(--ink,#16151B);\">Behavioural design<\u002Fspan>\n              <span style=\"font-family:'DM Sans', sans-serif; font-size:11px; text-transform:uppercase; letter-spacing:0.06em; padding:7px 12px; border:1px solid var(--line,rgba(22,21,27,0.14)); border-radius:100px; color:var(--ink,#16151B);\">Product concept<\u002Fspan>\n              <span style=\"font-family:'DM Sans', sans-serif; font-size:11px; text-transform:uppercase; letter-spacing:0.06em; padding:7px 12px; border:1px solid var(--line,rgba(22,21,27,0.14)); border-radius:100px; color:var(--ink,#16151B);\">Gamification<\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"go\" style=\"display:flex; align-items:center; gap:10px; font-family:'DM Sans', sans-serif; font-size:13px; letter-spacing:0.08em; text-transform:uppercase; color:#16151B; font-weight:700;\">View case study <span>→<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fa>\n\n        <!-- LEBKOV -->\n        <a href=\"Lebkov Menu - Case Study.html\" class=\"proj\" style=\"display:grid; grid-template-columns:0.95fr 1.05fr; gap:0; text-decoration:none; border-radius:18px; overflow:hidden; border:1px solid var(--line,rgba(22,21,27,0.1)); background:var(--canvas-2,#fff);\">\n          <div style=\"background:#C24B2C; padding:46px 44px; display:flex; flex-direction:column; justify-content:space-between; min-height:320px;\">\n            <div style=\"font-family: DM Sans; font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; color: #fff; text-align: center\">03 / Brand &amp; research<\u002Fdiv>\n            <div style=\"align-self:center; display:grid; grid-template-columns:1fr 1fr; gap:6px; width:170px;\">\n              \n              \n              \n              \n            <\u002Fdiv>\n            \n          <img src=\"51b6490a-a45f-4480-a1dd-38af0ba61719\" alt=\"\" style=\"max-width: 100%; height: 185px; display: block; object-fit: fill; width: 296px; align-self: center\"><div style=\"font-family: 'Syne'; font-weight: 600; font-size: 22px; color: #fff; text-align: center\">The silent salesman.<\u002Fdiv><\u002Fdiv>\n          <div style=\"padding:46px 44px; display:flex; flex-direction:column; justify-content:center;\">\n            <div style=\"font-family:'DM Sans', sans-serif; font-size:12px; letter-spacing:0.1em; text-transform:uppercase; color:var(--muted,#5C5A66);\">Lebkov &amp; Sons · UvA<\u002Fdiv>\n            <h2 style=\"font-family:'Syne'; font-weight:600; font-size:clamp(30px,3vw,44px); line-height:1.0; letter-spacing:-0.02em; margin:14px 0 14px; color:var(--ink,#16151B);\">Menu engineering<\u002Fh2>\n            <p style=\"font-family:'DM Sans'; font-size:18px; line-height:1.55; color:var(--muted,#5C5A66); margin:0 0 24px; max-width:42ch;\">Redesigning a café chain's digital menu boards with behavioural science and sales data, turning a 300-item menu into a system that sells.<\u002Fp>\n            <div style=\"display:flex; gap:8px; flex-wrap:wrap; margin-bottom:26px;\">\n              <span style=\"font-family:'DM Sans', sans-serif; font-size:11px; text-transform:uppercase; letter-spacing:0.06em; padding:7px 12px; border:1px solid var(--line,rgba(22,21,27,0.14)); border-radius:100px; color:var(--ink,#16151B);\">Behavioural science<\u002Fspan>\n              <span style=\"font-family:'DM Sans', sans-serif; font-size:11px; text-transform:uppercase; letter-spacing:0.06em; padding:7px 12px; border:1px solid var(--line,rgba(22,21,27,0.14)); border-radius:100px; color:var(--ink,#16151B);\">Data analysis<\u002Fspan>\n              <span style=\"font-family:'DM Sans', sans-serif; font-size:11px; text-transform:uppercase; letter-spacing:0.06em; padding:7px 12px; border:1px solid var(--line,rgba(22,21,27,0.14)); border-radius:100px; color:var(--ink,#16151B);\">Menu design<\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"go\" style=\"display:flex; align-items:center; gap:10px; font-family:'DM Sans', sans-serif; font-size:13px; letter-spacing:0.08em; text-transform:uppercase; color:#16151B; font-weight:700;\">View case study <span>→<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fa>\n\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ ABOUT ============ -->\n  <section id=\"about\" style=\"padding: 100px 40px;\">\n    <span style=\"color: var(--muted,#5C5A66); font-family: DM Sans; font-size: 13px\">ABOUT ME<\u002Fspan><div style=\"max-width:1180px; margin:0 auto; display:grid; grid-template-columns:0.85fr 1.15fr; gap:64px;\">\n      <div>\n        <div style=\"font-family:'DM Sans', sans-serif; font-size:13px; letter-spacing:0.18em; text-transform:uppercase; display:flex; gap:14px; align-items:center; color:#C24B2C;\">\n          <span>·<\u002Fspan>\n        <\u002Fdiv>\n        <h2 style=\"font-family:'Syne'; font-weight:600; font-size:clamp(30px,3.6vw,48px); line-height:1.04; letter-spacing:-0.02em; margin:22px 0 0; color:var(--ink,#16151B);\">I look for what actually moves people.<\u002Fh2>\n      <\u002Fdiv>\n      <div>\n        <p style=\"font-family:'DM Sans'; font-size:20px; line-height:1.6; color:var(--ink,#16151B); margin:0 0 22px;\">I studied the psychology of decision-making at the University of Amsterdam, then moved into brand and product marketing at Philips Sound, where over the last 4 years I have developed brand and communication strategies that resonate with audiences.<\u002Fp>\n        <p style=\"font-family:'DM Sans'; font-size:19px; line-height:1.65; color:var(--muted,#5C5A66); margin:0 0 22px;\">Across all three projects here, the method is the same: start from how people really behave, find the proven lever, and build the brand, product, or campaign around it. Whether that's anchoring on a menu board, a foot-in-the-door nudge in an app, or owning a colour across a global launch.<\u002Fp>\n        <p style=\"font-family:'DM Sans'; font-size:19px; line-height:1.65; color:var(--muted,#5C5A66); margin:0;\">Currently open to brand &amp; product-marketing roles where that mix is useful.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ FOOTER ============ -->\n  <footer style=\"background:#141210; color:#fff; padding:88px 40px 52px;\">\n    <div style=\"max-width:1180px; margin:0 auto;\">\n      <div style=\"display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; gap:48px;\">\n        <div style=\"max-width:30ch;\">\n          <div style=\"font-family:'Syne'; font-weight:600; font-size:clamp(34px,4.6vw,62px); line-height:0.95; color:#fff;\">Let's work together.<\u002Fdiv>\n          <a href=\"mailto:paulaledesma98@gmail.com\" style=\"font-family:'DM Sans'; font-size:18px; font-weight:600; color:var(--accent,#0B5ED7); text-decoration:none; display:inline-block; margin-top:20px;\">paulaledesma98@gmail.com<\u002Fa>\n          <div style=\"font-family:'DM Sans'; font-size:15px; color:rgba(255,255,255,0.55); margin-top:8px;\">Paula Ledesma · Brand &amp; Product Marketing<\u002Fdiv>\n        <\u002Fdiv>\n        <nav style=\"display:flex; flex-direction:column; gap:11px; min-width:210px;\">\n          <div style=\"font-family:'DM Sans'; font-size:12px; letter-spacing:0.14em; text-transform:uppercase; color:rgba(255,255,255,0.4); margin-bottom:6px;\">Case studies<\u002Fdiv>\n          <a href=\"Moving Sound - Case Study.html\" style=\"font-family:'DM Sans'; font-size:16px; font-weight:600; color:#fff; text-decoration:none;\">Moving Sound<\u002Fa>\n          <a href=\"GreenLife - Case Study.html\" style=\"font-family:'DM Sans'; font-size:16px; font-weight:600; color:#fff; text-decoration:none;\">GreenLife<\u002Fa>\n          <a href=\"Lebkov Menu - Case Study.html\" style=\"font-family:'DM Sans'; font-size:16px; font-weight:600; color:#fff; text-decoration:none;\">Menu Engineering<\u002Fa>\n          <a href=\"index.html\" style=\"font-family:'DM Sans'; font-size:15px; font-weight:600; color:var(--accent,#0B5ED7); text-decoration:none; margin-top:6px;\">All work →<\u002Fa>\n        <\u002Fnav>\n      <\u002Fdiv>\n      <div style=\"margin-top:56px; padding-top:22px; border-top:1px solid rgba(255,255,255,0.15); display:flex; justify-content:space-between; flex-wrap:wrap; gap:12px;\">\n        <span style=\"font-family:'DM Sans'; font-size:12px; color:rgba(255,255,255,0.45);\">Selected work · 2026<\u002Fspan>\n        <span style=\"font-family:'DM Sans'; font-size:12px; color:rgba(255,255,255,0.45);\">Made by Paula Ledesma<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:&quot;1280&quot;,&quot;height&quot;:&quot;2400&quot;},&quot;tone&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;Warm Light&quot;,&quot;Ink Dark&quot;],&quot;default&quot;:&quot;Warm Light&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Theme&quot;}}\">\nclass Component extends DCLogic {\n  renderVals() {\n    const tone = this.props.tone ?? 'Warm Light';\n    const dark = tone === 'Ink Dark';\n    const theme = dark\n      ? { canvas: '#131218', canvas2: '#1E1C2
